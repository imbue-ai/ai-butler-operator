<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <h1>PhoneBrowserUse</h1>
    <p class="desc">Browse the web with a phone call. Start a session to get your code.</p>

    <!-- Start screen -->
    <div id="screen-start">
      <button id="btn-start" class="btn-primary">Start Session</button>
    </div>

    <!-- Session active screen -->
    <div id="screen-session" class="hidden">
      <div class="info-card">
        <div class="label">Your Code</div>
        <div id="session-code" class="code-display"></div>
      </div>
      <div class="info-card">
        <div class="label">Call This Number</div>
        <div id="session-phone" class="phone-display"></div>
      </div>
      <div class="instructions">
        <p>1. Call the number above</p>
        <p>2. Tell the assistant your code</p>
        <p>3. Tell them what to do on the web</p>
        <p>4. Watch actions happen in your browser!</p>
      </div>
      <div id="session-status" class="status-badge">Waiting for call...</div>
    </div>

    <p id="status" class="status hidden"></p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
